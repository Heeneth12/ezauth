<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }
        .container {
            max-width: 480px;
            margin: 40px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb; /* Kubee Blue */
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -0.025em;
        }
        .title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
        }
        .text {
            font-size: 15px;
            line-height: 1.6;
            color: #4b5563;
            text-align: center;
            margin-bottom: 30px;
        }
        .otp-container {
            background-color: #f3f4f6;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .otp-code {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #111827;
            margin: 0;
        }
        .footer {
            font-size: 12px;
            text-align: center;
            color: #9ca3af;
            margin-top: 40px;
        }
        .divider {
            height: 1px;
            background-color: #f3f4f6;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">Kubee</div>

    <div class="title">Verify your email</div>
    <p class="text">
        To finish setting up your account, please use the following one-time password (OTP). It expires in 15 minutes.
    </p>

    <div class="otp-container">
        <h1 class="otp-code" th:text="${otp}">000000</h1>
    </div>

    <p class="text" style="font-size: 13px;">
        If you didn't request this, you can safely ignore this email.
    </p>

    <div class="divider"></div>

    <div class="footer">
        &copy; 2026 Kubee SaaS Ecosystem. All rights reserved.<br>
        Simplifying inventory for your business.
    </div>
</div>
</body>
</html>
